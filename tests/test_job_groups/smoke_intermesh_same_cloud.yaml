# JobGroup Intermesh same-cloud test - baseline test for Intermesh
# This test verifies Intermesh works on a single cloud before testing
# cross-cloud scenarios.
---
name: {{name}}
execution: parallel
intermesh:
  enabled: true
---
name: server
resources:
  cpus: 2
  cloud: aws
run: |
  echo "Server starting on $(hostname)"
  python3 -m http.server 8080 &
  SERVER_PID=$!
  sleep 60
  kill $SERVER_PID 2>/dev/null || true
  echo "Server done"
---
name: client
resources:
  cpus: 2
  cloud: aws
run: |
  echo "Client starting"
  sleep 15  # Wait for intermesh setup

  # Intermesh hostnames use .sky.mesh suffix
  SERVER_HOST="server-0.${SKYPILOT_JOBGROUP_NAME}.sky.mesh"
  echo "Testing connection to $SERVER_HOST:8080"

  for i in $(seq 1 10); do
    if curl -s --connect-timeout 5 http://$SERVER_HOST:8080/ > /dev/null 2>&1; then
      echo "SUCCESS: Connected to server via Intermesh"
      exit 0
    fi
    echo "Attempt $i failed, retrying..."
    sleep 3
  done

  echo "FAILED: Could not connect to server"
  exit 1
